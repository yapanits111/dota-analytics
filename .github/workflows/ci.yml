name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: dota
          POSTGRES_PASSWORD: dota
          POSTGRES_DB: dota_analytics
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Apply schema
        run: |
          PGPASSWORD=dota psql -h localhost -U dota \
            -d dota_analytics -f sql/schema.sql

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend deps
        run: pip install -r backend/requirements.txt

      - name: Backend health check
        env:
          DATABASE_URL: postgresql://dota:dota@localhost:5432/dota_analytics
          GEMINI_API_KEY: dummy
          GROQ_API_KEY: dummy
          ANTHROPIC_API_KEY: ""
          ALLOWED_ORIGINS: http://localhost:5173
        run: |
          cd backend
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 3
          curl -f http://localhost:8000/health
          curl -f http://localhost:8000/chat/providers

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Frontend build check
        run: |
          cd frontend
          npm ci
          npm run build
